<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Checkout - Rose n Petals</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Material Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Tailwind Configuration -->
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#f0426e",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221015",
                        "soft-pink": "#ffe4ec",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom scrollbar hiding for clean mobile look */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased selection:bg-primary selection:text-white">
<div class="relative flex flex-col min-h-screen max-w-md mx-auto bg-background-light dark:bg-background-dark overflow-hidden shadow-2xl">
<!-- Header -->
<header class="sticky top-0 z-20 flex items-center justify-between px-4 py-3 bg-background-light/90 dark:bg-background-dark/90 backdrop-blur-md border-b border-primary/10">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-primary/10 transition-colors text-slate-900 dark:text-slate-100">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h1 class="text-lg font-bold tracking-tight">Checkout</h1>
<div class="w-10"></div> <!-- Spacer for center alignment -->
</header>
<!-- Main Content (Scrollable) -->
<main class="flex-1 overflow-y-auto no-scrollbar pb-32">
<!-- Order Summary Card -->
<section class="px-4 py-6">
<div class="flex items-center gap-4 p-4 bg-white dark:bg-slate-800 rounded-2xl shadow-[0_4px_20px_-10px_rgba(240,66,110,0.15)] border border-primary/10">
<div class="relative w-20 h-20 shrink-0 rounded-lg overflow-hidden bg-gray-100">
<img alt="Red velvet rose bouquet" class="w-full h-full object-cover" data-alt="Red velvet rose bouquet close up" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAtI3FNyvJanlVL7omkcE0VWIEq5si9hXnurRdg8tawmNk2pMVGYBHPxuDnTxmyvjlcOB3ygPpZiTsL_jRJu1SNWSoJOCHnLNMst5CYiL1lPndMtrVj8WVEnUNRelcHFhNGB8-wjgecCaMJJGLwhHiqtyL6FO2RCiush2BX3_dP4F04VRV1CwrYDK35YxT0imaYFnLUp0Ua1kqfthm0PolDCGTmAVLkVkOFZxvZPJn6png3gMgeShKhJL7iNG5RQoi0C3Sqq3alhxk"/>
</div>
<div class="flex-1 min-w-0">
<h2 class="text-base font-bold text-slate-900 dark:text-slate-100 truncate">Red Velvet Rose Bunch</h2>
<p class="text-sm text-slate-500 dark:text-slate-400 mt-0.5">Premium Arrangement</p>
<div class="flex items-center justify-between mt-2">
<span class="text-primary font-bold text-lg">₹ 899</span>
<button class="text-xs font-medium text-slate-500 underline decoration-slate-300 dark:decoration-slate-600 offset-2">Edit</button>
</div>
</div>
</div>
</section>
<!-- Delivery Form -->
<form class="px-4 space-y-6">
<!-- Contact Info -->
<div>
<h3 class="text-base font-bold mb-4 flex items-center gap-2">
<span class="flex items-center justify-center w-6 h-6 rounded-full bg-primary/20 text-primary text-xs font-bold">1</span>
                        Contact Info
                    </h3>
<div class="space-y-4">
<div class="group relative">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5 ml-1" for="fullname">Full Name</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 material-symbols-outlined text-[20px]">person</span>
<input class="w-full pl-11 pr-4 py-3.5 bg-white dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary/50 rounded-xl text-sm font-medium transition-all placeholder:text-slate-300 dark:placeholder:text-slate-600" id="fullname" placeholder="e.g. Ananya Singh" type="text"/>
</div>
</div>
<div class="group relative">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5 ml-1" for="mobile">Mobile Number</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 material-symbols-outlined text-[20px]">smartphone</span>
<input class="w-full pl-11 pr-4 py-3.5 bg-white dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary/50 rounded-xl text-sm font-medium transition-all placeholder:text-slate-300 dark:placeholder:text-slate-600" id="mobile" placeholder="+91 98765 43210" type="tel"/>
</div>
</div>
</div>
</div>
<!-- Delivery Details -->
<div>
<h3 class="text-base font-bold mb-4 flex items-center gap-2">
<span class="flex items-center justify-center w-6 h-6 rounded-full bg-primary/20 text-primary text-xs font-bold">2</span>
                        Delivery Details
                    </h3>
<div class="space-y-4">
<div class="group relative">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5 ml-1" for="address">Flat / House No. &amp; Street</label>
<textarea class="w-full px-4 py-3 bg-white dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary/50 rounded-xl text-sm font-medium transition-all placeholder:text-slate-300 dark:placeholder:text-slate-600 resize-none" id="address" placeholder="e.g. 12B, Palm Grove Apts, 4th Cross" rows="2"></textarea>
</div>
<div class="group relative">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5 ml-1" for="area">Select Area</label>
<div class="relative">
<select class="w-full pl-4 pr-10 py-3.5 bg-white dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary/50 rounded-xl text-sm font-medium transition-all appearance-none text-slate-900 dark:text-slate-100" id="area">
<option disabled="" selected="" value="">Choose locality</option>
<option value="kavi_nagar">Kavi Nagar</option>
<option value="raj_nagar">Raj Nagar</option>
<option value="other">Other</option>
</select>
<span class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 material-symbols-outlined text-[24px] pointer-events-none">keyboard_arrow_down</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="group relative">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5 ml-1">Date</label>
<div class="relative">
<input class="w-full pl-3 pr-2 py-3.5 bg-white dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary/50 rounded-xl text-sm font-medium transition-all text-slate-900 dark:text-slate-100 min-h-[48px]" type="date"/>
</div>
</div>
<div class="group relative">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5 ml-1">Time Slot</label>
<div class="relative">
<select class="w-full pl-3 pr-8 py-3.5 bg-white dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary/50 rounded-xl text-sm font-medium transition-all appearance-none text-slate-900 dark:text-slate-100 min-h-[48px]">
<option>10 AM - 1 PM</option>
<option>1 PM - 4 PM</option>
<option>4 PM - 7 PM</option>
<option>7 PM - 10 PM</option>
</select>
<span class="absolute right-2 top-1/2 -translate-y-1/2 text-slate-400 material-symbols-outlined text-[20px] pointer-events-none">schedule</span>
</div>
</div>
</div>
<div class="group relative">
<label class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5 ml-1 flex justify-between" for="message">
<span>Message on Card</span>
<span class="text-[10px] text-slate-400">Optional</span>
</label>
<div class="relative">
<span class="absolute left-4 top-4 text-slate-400 material-symbols-outlined text-[20px]">favorite</span>
<textarea class="w-full pl-11 pr-4 py-3 bg-white dark:bg-slate-800 border-none ring-1 ring-slate-200 dark:ring-slate-700 focus:ring-2 focus:ring-primary/50 rounded-xl text-sm font-medium transition-all placeholder:text-slate-300 dark:placeholder:text-slate-600 resize-none" id="message" placeholder="Write a lovely message..." rows="3"></textarea>
</div>
</div>
</div>
</div>
<!-- Payment Method -->
<div class="pb-6">
<h3 class="text-base font-bold mb-4 flex items-center gap-2">
<span class="flex items-center justify-center w-6 h-6 rounded-full bg-primary/20 text-primary text-xs font-bold">3</span>
                        Preferred Payment
                    </h3>
<div class="grid grid-cols-2 gap-4">
<label class="cursor-pointer group">
<input checked="" class="peer sr-only" name="payment" type="radio" value="upi"/>
<div class="flex flex-col items-center justify-center p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:ring-1 peer-checked:ring-primary transition-all">
<span class="material-symbols-outlined text-3xl mb-2 text-slate-400 group-hover:text-primary peer-checked:text-primary transition-colors">qr_code_2</span>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 peer-checked:text-primary">UPI</span>
</div>
</label>
<label class="cursor-pointer group">
<input class="peer sr-only" name="payment" type="radio" value="bank"/>
<div class="flex flex-col items-center justify-center p-4 bg-white dark:bg-slate-800 rounded-xl border border-slate-200 dark:border-slate-700 peer-checked:border-primary peer-checked:bg-primary/5 peer-checked:ring-1 peer-checked:ring-primary transition-all">
<span class="material-symbols-outlined text-3xl mb-2 text-slate-400 group-hover:text-primary peer-checked:text-primary transition-colors">account_balance</span>
<span class="text-sm font-semibold text-slate-700 dark:text-slate-300 peer-checked:text-primary">Bank Transfer</span>
</div>
</label>
</div>
</div>
</form>
</main>
<!-- Fixed Bottom CTA -->
<footer class="absolute bottom-0 left-0 right-0 z-20 bg-white/80 dark:bg-slate-900/80 backdrop-blur-lg border-t border-primary/10 p-4 shadow-[0_-4px_20px_-5px_rgba(0,0,0,0.05)]">
<button class="w-full group flex items-center justify-center gap-3 bg-primary hover:bg-primary/90 active:scale-[0.98] text-white py-4 rounded-xl shadow-lg shadow-primary/30 transition-all">
<span class="text-base font-bold">Confirm on WhatsApp</span>
<svg class="w-5 h-5" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"></path>
</svg>
</button>
<p class="text-[10px] text-center text-slate-400 mt-2 font-medium">Next step opens WhatsApp with your order details</p>
</footer>
</div>
</body></html>
